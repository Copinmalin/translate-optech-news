wrap_width: 140

preferred_terms:
  newsletter: bulletin
  newsletters: bulletins

headings:
  News: "Nouvelles"
  Changes in client software and services: "Changements dans les services et logiciels clients"
  Updates and release candidates: "Mises à jour et versions candidates"
  Notable code and documentation changes: "Changements notables dans le code et la documentation"
  Bitcoin Core PR Review Club: "Bitcoin Core PR Review Club"
  Consensus changes: "Modification du consensus"
  Selected Bitcoin Stack Exchange Questions and Answers: "Questions et réponses sélectionnées de Bitcoin Stack Exchange"

preferred_phrases:
  client_changes_intro: |
    *Dans cette rubrique mensuelle, nous mettons en lumière des mises à jour intéressantes des portefeuilles et services Bitcoin.*

  releases_intro: |
    _Nouvelles versions et versions candidates pour des projets d'infrastructure Bitcoin populaires. Veuillez envisager de mettre à niveau
    vers les nouvelles versions ou d'aider à tester les versions candidates._

  pr_review_intro: |
    *Dans cette section mensuelle, nous résumons une récente réunion du [Bitcoin Core PR Review Club][], en soulignant certaines des
    questions et réponses importantes. Cliquez sur une question ci-dessous pour voir un résumé de la réponse de la réunion.*

  consensus_intro: |
    _Une nouvelle section mensuelle résumant les propositions et discussions sur la modification des règles de consensus de Bitcoin._

  stackexchange_intro: |
    *[Bitcoin Stack Exchange][bitcoin.se] est l'un des premiers endroits où les contributeurs d'Optech cherchent des réponses à leurs
    questions---ou quand nous avons quelques moments libres pour aider les utilisateurs curieux ou confus. Dans cette rubrique mensuelle,
    nous mettons en lumière certaines des questions et réponses les mieux votées postées depuis notre dernière mise à jour.*
