name: Run Optech Translation (Node24)

run-name: >-
  Optech Node24 | ${{ inputs.target }} | ${{ inputs.min_date }}

on:
  workflow_dispatch:
    inputs:
      target:
        description: "batch, latest, or a full newsletter URL"
        required: true
        default: "batch"
        type: string
      min_date:
        description: "Minimum newsletter date (YYYY-MM-DD)"
        required: true
        default: "2022-07-01"
        type: string
      limit:
        description: "Maximum number of newsletters in batch mode (leave empty for all)"
        required: false
        default: "3"
        type: string
      pause:
        description: "Pause between newsletters in batch mode"
        required: true
        default: "0.5"
        type: string
      oldest_first:
        description: "Process oldest to newest"
        required: true
        default: true
        type: boolean
      force_gpt:
        description: "Force GPT even if a native FR version exists"
        required: true
        default: false
        type: boolean
      overwrite:
        description: "Overwrite existing generated files"
        required: true
        default: false
        type: boolean
      model:
        description: "OpenAI model"
        required: true
        default: "gpt-5.4"
        type: string
      output_dir:
        description: "Output directory"
        required: true
        default: "output"
        type: string

permissions:
  contents: read

jobs:
  run-translation:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ inputs.model }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run translation
        shell: bash
        run: |
          set -euo pipefail

          CMD=(python optech_fr.py "${{ inputs.target }}" \
            --min-date "${{ inputs.min_date }}" \
            --pause "${{ inputs.pause }}" \
            --model "${{ inputs.model }}" \
            --output-dir "${{ inputs.output_dir }}")

          if [ -n "${{ inputs.limit }}" ]; then
            CMD+=(--limit "${{ inputs.limit }}")
          fi

          if [ "${{ inputs.oldest_first }}" = "true" ]; then
            CMD+=(--oldest-first)
          fi

          if [ "${{ inputs.force_gpt }}" = "true" ]; then
            CMD+=(--force-gpt)
          fi

          if [ "${{ inputs.overwrite }}" = "true" ]; then
            CMD+=(--overwrite)
          fi

          printf 'Running command:\n%s\n' "${CMD[*]}"
          "${CMD[@]}"

      - name: Upload generated files
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: optech-output-${{ github.run_number }}
          path: |
            ${{ inputs.output_dir }}
          if-no-files-found: warn
