name: Repair FR newsletter links v3

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "audit or apply"
        required: true
        default: "audit"
        type: choice
        options:
          - audit
          - apply
      target:
        description: "relative path inside the fork checkout"
        required: true
        default: "_posts/fr/newsletters"
        type: string
      overwrite_branch:
        description: "branch name for future commit/export"
        required: true
        default: "fix/fr-links"
        type: string

permissions:
  contents: read

jobs:
  repair-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tooling repository
        uses: actions/checkout@v6
        with:
          path: tooling

      - name: Checkout target fork repository
        uses: actions/checkout@v6
        with:
          repository: Copinmalin/bitcoinops.github.io
          ref: master
          path: target_repo

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run link repair against fork checkout
        working-directory: tooling
        env:
          PYTHONPATH: .
        run: |
          python tools/repair_fr_links.py \
            --mode "${{ inputs.mode }}" \
            --target "../target_repo/${{ inputs.target }}" \
            --branch "${{ inputs.overwrite_branch }}"

      - name: Upload reports and patched files
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: repair-fr-links-report-v3
          path: |
            tooling/output/link-repair-report.json
            tooling/output/link-repair-diff.patch
            target_repo/_posts/fr/newsletters
          if-no-files-found: warn
