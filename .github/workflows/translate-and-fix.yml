name: Traduction et réparation complètes

on:
  workflow_dispatch:
    inputs:
      target:
        description: "batch, latest ou URL d’une newsletter"
        default: "batch"
      min_date:
        description: "Date minimale (YYYY-MM-DD)"
        default: "2018-06-07"
      limit:
        description: "Nombre maximal de newsletters en mode batch"
        default: "5"
      output_dir:
        description: "Répertoire de sortie"
        default: "output"
      repair_target:
        description: "Chemin à réparer (output ou _posts/fr/newsletters)"
        default: "output"

jobs:
  translate-and-fix:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout tooling repo
        uses: actions/checkout@v6

      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          repository: Copinmalin/bitcoinops.github.io
          ref: master
          path: target_repo

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run translation with linkresolver3
        run: |
          python optech_fr_linkresolver3.py "${{ inputs.target }}" \
            --min-date "${{ inputs.min_date }}" \
            --limit "${{ inputs.limit }}" \
            --output-dir "${{ inputs.output_dir }}" \
            --overwrite

      - name: Fix internal links
        run: |
          python scripts/resolve_optech_newsletter_links.py \
            --bitcoinops-repo target_repo \
            --lang fr \
            --file "${{ inputs.repair_target }}" \
            --write \
            --report reports/fix-report.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: optech-translated-and-fixed
          path: |
            ${{ inputs.output_dir }}
            reports/fix-report.json
