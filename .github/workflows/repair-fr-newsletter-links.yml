name: Repair FR newsletter links

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "audit or apply"
        required: true
        default: "audit"
        type: choice
        options:
          - audit
          - apply
      target:
        description: "single file, glob, or directory"
        required: true
        default: "_posts/fr/newsletters"
        type: string
      overwrite_branch:
        description: "branch name for future commit/export"
        required: true
        default: "fix/fr-links"
        type: string

permissions:
  contents: read

jobs:
  repair-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run link repair
        run: |
          python tools/repair_fr_links.py \
            --mode "${{ inputs.mode }}" \
            --target "${{ inputs.target }}" \
            --branch "${{ inputs.overwrite_branch }}"

      - name: Upload reports and patched files
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: repair-fr-links-report
          path: |
            output/link-repair-report.json
            output/link-repair-diff.patch
            _posts/fr/newsletters
          if-no-files-found: warn
